publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^13.2.5
  dio: ^5.9.1
  flutter_secure_storage: ^9.0.0

  file_picker: ^8.1.2
  image_picker: ^1.2.1
  photo_view: ^0.15.0
  url_launcher: ^6.3.2

  syncfusion_flutter_pdfviewer: ^32.1.25

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
